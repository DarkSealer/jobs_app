  projects:
    - name: "Romanian Aikido Federation Management Platform"
      description: "Built production mobile applications for club and federation management, including attendance tracking, payments, invoice generation, QR-based workflows, member management, trainer tools, and federation registration flows."
      technologies:
        - Flutter
        - Firebase
        - Firestore
        - Cloud Functions
        - PDF Generation
        - QR Code
        - REST API

    - name: "AI-Powered Email Marketing Automation Pipeline"
      description: "Designed and built an end-to-end AI marketing automation system that pulls live WooCommerce product data, semantically indexes it, retrieves relevant context, and generates personalized email campaigns automatically."
      technologies:
        - n8n
        - WooCommerce API
        - Pinecone
        - GPT-4o
        - SMTP
        - AI Automation

    - name: "InfoBanat Mobile App"
      description: "Built a Flutter mobile app for content delivery from a WordPress-based publication, optimizing article fetching, structure, and presentation for a clean, modern reading experience."
      technologies:
        - Flutter
        - WordPress
        - REST API

    - name: "Driving School Questionnaire App"
      description: "Built a mobile app for driving school exam preparation with question databases, answer validation, performance statistics, and response-time tracking."
      technologies:
        - Flutter
        - SQLite
        - Local Database

    - name: "WebGL Product Presentation Simulator"
      description: "Created a Unity WebGL simulator with a virtual environment for presenting products and interactive visual content."
      technologies:
        - Unity
        - C#
        - WebGL

    - name: "AR App for Retail Markets"
      description: "Developed a Unity-based augmented reality mobile application that displayed animations and interactive content on store shelves for physical products."
      technologies:
        - Unity
        - C#
        - AR

    - name: "FRIDAY AI Assistant"
      description: "Built a local JARVIS-style assistant architecture using local LLM workflows, memory organization, retrieval pipelines, and tool integrations for personal productivity and information access."
      technologies:
        - Python
        - LM Studio
        - Gemma
        - Local LLM
        - Retrieval
        - Automation

# Search Preferences
search:
  # Location preferences
  locations:
    - "Remote"
    - "Europe"
    - "Romania"

  # Radius in miles for location-based search
  radius_miles: 0

  # Include remote jobs
  include_remote: true

  # Remote-only mode
  remote_only: true

  # Job types to include
  job_types:
    - full-time
    - contract

  # Experience levels
  experience_levels:
    - senior
    - lead
    - staff

  # Minimum salary expectation
  # Set as annual baseline equivalent of roughly 2500 EUR/month
  min_salary: 30000

  # Keywords to prioritize
  priority_keywords:
    - "flutter"
    - "remote"
    - "cross-platform"
    - "mobile"
    - "desktop"
    - "firebase"
    - "supabase"
    - "ai"
    - "automation"
    - "product"
    - "ios"
    - "android"
    - "windows"
    - "web"

  # Keywords to exclude
  exclude_keywords:
    - "internship"
    - "junior"
    - "entry level"
    - "on-site"
    - "onsite"
    - "hybrid"

