# Matching Configuration
matching:
  # Minimum skill match percentage (0-100)
  min_skill_match: 60

  # Weight for skills in matching (0-1)
  skills_weight: 0.45

  # Weight for experience in matching (0-1)
  experience_weight: 0.3

  # Weight for project relevance (0-1)
  projects_weight: 0.25

  # Require exact tech stack match
  strict_tech_match: false

# Output Settings
output:
  # Save results to file
  save_to_file: true
  output_format: "json"
  output_directory: "./results"

  # Display settings
  show_matches_in_terminal: true
  verbose: true